name: Rust

on:
  push:
    branches: [ "master" ]
    paths:
      - "src/**"
      - "examples/**"
  pull_request:
    branches: [ "master" ]
    paths:
      - "src/**"
      - "examples/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
